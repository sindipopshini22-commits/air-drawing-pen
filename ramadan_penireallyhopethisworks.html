<!DOCTYPE html>
<html>
<head>
  <title>Ramadan Pen</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #050301; overflow: hidden; }
    video { 
      display: block; 
      width: 640px; 
      height: 480px; 
      position: absolute; 
      top: 10px; 
      left: 10px; 
      z-index: 0; 
    }
    canvas { 
      width: 100%; 
      height: 100%; 
      transform: scaleX(-1); 
      position: absolute; 
      z-index: 1; 
    }
  </style>
</head>
<body>
  <video id="vid" autoplay playsinline></video>
  <canvas id="c"></canvas>

  <script>
    const vid = document.getElementById('vid');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    let arr = [];
    let cur = [];
    let shift = false;
    let draw = false;
    let sx = null, sy = null;

    // Keyboard controls
    window.onkeydown = e => {
      if (e.key === 'Shift') shift = true;
      if (e.code === 'Space') arr = [];
    };
    window.onkeyup = e => {
      if (e.key === 'Shift') shift = false;
    };

    function run(res) {
      c.width = window.innerWidth;
      c.height = window.innerHeight;

      // Draw video as background
      ctx.drawImage(vid, 0, 0, c.width, c.height);

      // Dark overlay
      ctx.fillStyle = 'rgba(10,6,2,0.85)';
      ctx.fillRect(0, 0, c.width, c.height);

      // Glow brush settings
      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur = 15;
      ctx.strokeStyle = '#F5D061';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Draw previous paths
      for (let path of arr) {
        ctx.beginPath();
        for (let j = 0; j < path.length; j++) {
          if (j === 0) ctx.moveTo(path[j].x, path[j].y);
          else ctx.lineTo(path[j].x, path[j].y);
        }
        ctx.stroke();
      }

      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const lm = res.multiHandLandmarks[0];

        drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(245,208,97,0.3)', lineWidth: 2 });
        drawLandmarks(ctx, lm, { color: '#FFFFFF', lineWidth: 1, radius: 2 });

        const ind = lm[8]; // index finger tip
        const rx = ind.x * c.width;
        const ry = ind.y * c.height;

        if (sx === null) { sx = rx; sy = ry; }
        else { sx += (rx - sx) * 0.45; sy += (ry - sy) * 0.45; }

        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, 2 * Math.PI);
        ctx.fillStyle = shift ? '#FFFFFF' : 'rgba(245,208,97,0.4)';
        ctx.fill();

        if (shift) {
          if (!draw) {
            draw = true;
            cur = [];
            arr.push(cur);
          }
          cur.push({x: sx, y: sy});
        } else draw = false;

      } else {
        draw = false;
        sx = null;
      }
    }

    // Setup MediaPipe Hands
    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(run);

    // Use native getUserMedia instead of MediaPipe Camera
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      vid.srcObject = stream;
      vid.play();

      async function processFrame() {
        await hands.send({ image: vid });
        requestAnimationFrame(processFrame);
      }

      processFrame();
    }).catch(err => {
      console.error('Camera error:', err);
      alert('Could not access camera: ' + err.message);
    });
  </script>
</body>
</html>
